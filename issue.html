<!DOCTYPE html>
<html>

<head>

<title>Borrow Books</title>

<link rel="stylesheet" href="assets/css/bootstrap.css">
<link rel="stylesheet" href="assets/css/font-awesome.css">
<link rel="stylesheet" href="assets/css/style.css">

<style>

.header-bar{
background: linear-gradient(135deg, #0b3d91, #6a11cb);
padding:15px;
border-bottom:3px solid rgba(255,255,255,0.18);
}

.menu-bar{
background:#ffffff;
border-bottom:2px solid #7e57c2;
padding:12px;
}

.menu-bar a{
margin-right:20px;
text-decoration:none;
font-weight:600;
color:#333;
}

.menu-bar a:hover{
color:#7e57c2;
}

.form-box{
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
margin-top:30px;
max-width:600px;
}

</style>

</head>


<body>

<!-- HEADER -->
<div class="header-bar">

<div style="display:flex;justify-content:space-between;align-items:center">

<h3 style="margin:0">
<i class="fa fa-book"></i> Online Library Management System 
</h3>

<button onclick="logout()" class="btn btn-danger">
LOG OUT
</button>

</div>

</div>


<!-- MENU -->
<div class="menu-bar">

<a href="dashboard.html">Dashboard</a>

<a href="books.html">Books</a>

<a href="students.html">Students</a>

<a href="issue.html">Issue New Book</a>

<a href="manage-issue.html">Manage Issued Books</a>

</div>


<div class="container">

<div class="form-box">

<h3 class="header-line">Borrow Book</h3>

<br>

<form>

<div class="form-group">
<label>Student Name</label>
<input id="issue-student" type="text" class="form-control" placeholder="Enter student name">
</div>

<div class="form-group">
<label>Book Name</label>
<input id="issue-book" type="text" class="form-control" placeholder="Enter book name">
</div>

<div class="form-group">
<label>ISBN</label>
<input id="issue-isbn" type="text" class="form-control" placeholder="Enter ISBN">
</div>

<div class="form-group">
<label>Issue Date</label>
<input id="issue-date" type="date" class="form-control">
</div>

<br>

<button type="button" onclick="issueBook()" class="btn btn-success">
<i class="fa fa-check"></i> Borrow Book
</button>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
