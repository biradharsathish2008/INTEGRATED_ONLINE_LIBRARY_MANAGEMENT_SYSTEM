<!DOCTYPE html>
<html>

<head>

<title>Students</title>

<link rel="stylesheet" href="assets/css/bootstrap.css">
<link rel="stylesheet" href="assets/css/font-awesome.css">
<link rel="stylesheet" href="assets/css/style.css">

<style>

.header-bar{
background: linear-gradient(135deg, #0b3d91, #6a11cb);
padding:15px;
border-bottom:3px solid rgba(255,255,255,0.18);
}

.menu-bar{
background:#ffffff;
border-bottom:2px solid #7e57c2;
padding:12px;
}

.menu-bar a{
margin-right:20px;
text-decoration:none;
font-weight:600;
color:#333;
}

.menu-bar a:hover{
color:#7e57c2;
}

.content-box{
background:white;
padding:25px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
margin-top:30px;
}

.table th{
background:#f5f6fa;
}

</style>

</head>


<body>

<!-- HEADER -->
<div class="header-bar">

<div style="display:flex;justify-content:space-between;align-items:center">

<h3 style="margin:0">
<i class="fa fa-book"></i> Online Library Management System
</h3>

<button onclick="logout()" class="btn btn-danger">
LOG OUT
</button>

</div>

</div>


<!-- MENU -->
<div class="menu-bar">

<a href="dashboard.html">Dashboard</a>

<a href="books.html">Books</a>

<a href="students.html">Students</a>

<a href="issue.html">Issue New Book</a>

<a href="manage-issue.html">Manage Issued Books</a>

</div>


<div class="container">

<div class="content-box">

<h3 class="header-line">Registered Students</h3>

<br>

<table class="table table-striped table-bordered table-hover">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Action</th>
</tr>

</thead>

<tbody id="students-tbody">
</tbody>

</table>

</div>

</div>

<script src="script.js"></script>
<script>
function renderStudents(){
  var tbody = document.getElementById('students-tbody');
  if(!tbody) return;
  var students = getStudents();
  tbody.innerHTML = '';
  students.forEach(function(student){
    var tr = document.createElement('tr');

    tr.innerHTML =
      '<td>' + student.id + '</td>' +
      '<td>' + student.name + '</td>' +
      '<td>' + student.email + '</td>' +
      '<td>' + student.mobile + '</td>' +
      '<td>' +
      '<button class="btn btn-primary btn-xs" onclick="editStudent(this)"><i class="fa fa-edit"></i> Edit</button> ' +
      '<button class="btn btn-danger btn-xs" onclick="deleteStudent(this)"><i class="fa fa-trash"></i> Delete</button>' +
      '</td>';

    tbody.appendChild(tr);
  });
}

function editStudent(button){
  var row = button.parentNode.parentNode;
  var id = parseInt(row.cells[0].innerText, 10);
  var students = getStudents();
  var student = students.find(function(s){ return s.id === id; });
  if(!student) return;

  var newName = prompt('Name:', student.name);
  var newEmail = prompt('Email:', student.email);
  var newMobile = prompt('Mobile:', student.mobile);
  var newPassword = prompt('Password:', student.password);

  if(newName && newEmail && newMobile && newPassword){
    student.name = newName;
    student.email = newEmail;
    student.mobile = newMobile;
    student.password = newPassword;
    saveStudents(students);
    renderStudents();
  }
}

function deleteStudent(button){
  var row = button.parentNode.parentNode;
  var id = parseInt(row.cells[0].innerText, 10);
  if(!confirm('Delete this student?')) return;
  var students = getStudents().filter(function(s){ return s.id !== id; });
  saveStudents(students);
  renderStudents();
}

window.addEventListener('DOMContentLoaded', function(){
  renderStudents();
});
</script>

</body>
</html>
